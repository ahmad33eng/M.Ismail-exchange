<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>لوحة التحكم - م. إسماعيل</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    :root{--green:#059669;--green-dark:#047857;--bg:#f0fdf4;--bg2:#dcfce7;--card:#ffffff;--text:#1e293b;--text2:#475569;--border:#e2e8f0;--red:#dc2626;--blue:#2563eb;--yellow:#fbbf24}
    *{box-sizing:border-box;font-family:'Cairo',sans-serif}
    body{margin:0;background:linear-gradient(135deg,var(--bg) 0%,var(--bg2) 100%);min-height:100vh;padding:16px;color:var(--text)}
    .container{max-width:1100px;margin:0 auto}
    .login-box{background:var(--card);padding:32px;border-radius:24px;box-shadow:0 10px 40px rgba(0,0,0,.1);max-width:400px;margin:80px auto;text-align:center;border:2px solid var(--border)}
    .login-box h1{margin:0 0 24px;color:var(--green);font-weight:900;font-size:28px}
    .login-box input{width:100%;padding:14px;border:2px solid var(--border);border-radius:14px;font-size:16px;margin-bottom:12px;font-weight:600;text-align:center}
    .login-box button{background:var(--green);color:white;border:none;padding:14px 32px;border-radius:14px;font-weight:900;font-size:16px;cursor:pointer;width:100%;transition:.2s}
    .login-box button:active{transform:scale(.96)}
    .admin-panel{display:none}
    .header{background:var(--card);padding:20px 24px;border-radius:20px;margin-bottom:20px;box-shadow:0 4px 20px rgba(0,0,0,.06);display:flex;justify-content:space-between;align-items:center;border:2px solid var(--border)}
    .header h1{margin:0;color:var(--green);font-weight:900;font-size:24px}
    .btn-logout{background:var(--red);color:white;border:none;padding:10px 20px;border-radius:12px;font-weight:700;cursor:pointer;transition:.2s}
    .btn-logout:active{transform:scale(.95)}
    .tabs{display:flex;gap:10px;margin-bottom:20px;overflow-x:auto;padding-bottom:4px}
    .tab{background:var(--card);border:2px solid var(--border);padding:12px 24px;border-radius:14px;cursor:pointer;font-weight:700;white-space:nowrap;transition:.2s}
    .tab.active{background:var(--green);color:white;border-color:var(--green)}
    .tab-content{display:none}
    .tab-content.active{display:block}
    .card{background:var(--card);padding:24px;border-radius:20px;margin-bottom:20px;box-shadow:0 4px 20px rgba(0,0,0,.06);border:2px solid var(--border)}
    .card h2{margin:0 0 20px;color:var(--text);font-weight:900;font-size:20px;display:flex;align-items:center;gap:10px}
    .card h2 i{color:var(--green)}
    .form-group{margin-bottom:16px}
    .form-group label{display:block;margin-bottom:8px;font-weight:700;color:var(--text2);font-size:14px}
    .form-group input,.form-group textarea{width:100%;padding:12px;border:2px solid var(--border);border-radius:12px;font-size:15px;font-weight:600;transition:.2s}
    .form-group input:focus,.form-group textarea:focus{border-color:var(--green);outline:none}
    .form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px}
    .btn-save{background:var(--green);color:white;border:none;padding:12px 28px;border-radius:12px;font-weight:900;font-size:15px;cursor:pointer;transition:.2s;display:inline-flex;align-items:center;gap:8px}
    .btn-save:active{transform:scale(.96)}
    .btn-add{background:var(--blue);color:white;border:none;padding:10px 20px;border-radius:10px;font-weight:700;cursor:pointer;font-size:14px;transition:.2s}
    .btn-add:active{transform:scale(.95)}
    .btn-delete{background:var(--red);color:white;border:none;padding:8px 16px;border-radius:8px;font-weight:700;cursor:pointer;font-size:13px;transition:.2s}
    .btn-delete:active{transform:scale(.95)}
    .rate-item{background:var(--bg);padding:16px;border-radius:14px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center;border:2px solid var(--border)}
    .rate-info{display:flex;align-items:center;gap:12px}
    .rate-info img{width:40px;height:28px;border-radius:6px;border:2px solid var(--border)}
    .rate-info strong{font-size:16px}
    .rate-info span{color:var(--text2);font-size:14px;font-weight:600}
    .msg{position:fixed;bottom:24px;right:24px;background:var(--green);color:white;padding:14px 24px;border-radius:14px;font-weight:700;box-shadow:0 8px 25px rgba(5,150,105,.4);z-index:9999;animation:slideIn.3s}
    @keyframes slideIn{from{transform:translateX(100px);opacity:0}to{transform:translateX(0);opacity:1}}
    .checkbox-group{display:flex;align-items:center;gap:10px;margin:12px 0}
    .checkbox-group input{width:20px;height:20px;cursor:pointer}
    .checkbox-group label{margin:0;cursor:pointer}
    .stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:20px}
    .stat-card{background:linear-gradient(135deg,var(--green) 0%,var(--green-dark) 100%);color:white;padding:20px;border-radius:16px;text-align:center}
    .stat-card h3{margin:0 0 8px;font-size:14px;opacity:.9;font-weight:600}
    .stat-card .value{font-size:32px;font-weight:900}
    @media (max-width:768px){.form-row{grid-template-columns:1fr}.stats-grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
<div class="container">
  <div id="loginScreen" class="login-box">
    <h1><i class="fa-solid fa-lock"></i> لوحة التحكم</h1>
    <input type="password" id="passwordInput" placeholder="كلمة المرور" onkeypress="if(event.key==='Enter')login()">
    <button onclick="login()"><i class="fa-solid fa-right-to-bracket"></i> دخول</button>
  </div>

  <div id="adminPanel" class="admin-panel">
    <div class="header">
      <h1><i class="fa-solid fa-shield-halved"></i> لوحة تحكم م. إسماعيل</h1>
      <button class="btn-logout" onclick="logout()"><i class="fa-solid fa-right-from-bracket"></i> خروج</button>
    </div>

    <div class="stats-grid">
      <div class="stat-card">
        <h3>إجمالي الطلبات</h3>
        <div class="value" id="totalOrders">0</div>
      </div>
      <div class="stat-card" style="background:linear-gradient(135deg,#f59e0b 0%,#d97706 100%)">
        <h3>طلبات اليوم</h3>
        <div class="value" id="todayOrders">0</div>
      </div>
      <div class="stat-card" style="background:linear-gradient(135deg,#3b82f6 0%,#2563eb 100%)">
        <h3>قيد الانتظار</h3>
        <div class="value" id="pendingOrders">0</div>
      </div>
    </div>

    <div class="tabs">
      <div class="tab active" onclick="switchTab('general')"><i class="fa-solid fa-gear"></i> عام</div>
      <div class="tab" onclick="switchTab('rates')"><i class="fa-solid fa-coins"></i> العملات</div>
      <div class="tab" onclick="switchTab('vip')"><i class="fa-solid fa-crown"></i> VIP</div>
      <div class="tab" onclick="switchTab('orders')"><i class="fa-solid fa-list"></i> الطلبات</div>
    </div>

    <!-- تبويب عام -->
    <div id="generalTab" class="tab-content active">
      <div class="card">
        <h2><i class="fa-solid fa-bullhorn"></i> الشريط المتحرك</h2>
        <div class="form-group">
          <label>النص</label>
          <input type="text" id="marqueeText" placeholder="الأسعار محدثة لحظياً">
        </div>
        <div class="checkbox-group">
          <input type="checkbox" id="marqueeShow">
          <label for="marqueeShow">إظهار الشريط</label>
        </div>
        <button class="btn-save" onclick="saveMarquee()"><i class="fa-solid fa-floppy-disk"></i> حفظ</button>
      </div>

      <div class="card">
        <h2><i class="fa-solid fa-chart-line"></i> أسعار الصرف اليوم - تطلع فوق</h2>
        <div id="topRatesList"></div>
        <div class="form-row">
          <div class="form-group">
            <label>اسم العملة</label>
            <input type="text" id="topRateName" placeholder="دولار أمريكي">
          </div>
          <div class="form-group">
            <label>السعر</label>
            <input type="text" id="topRatePrice" placeholder="14600">
          </div>
        </div>
        <div class="form-group">
          <label>رابط صورة العلم</label>
          <input type="text" id="topRateFlag" placeholder="https://flagcdn.com/us.svg">
        </div>
        <button class="btn-add" onclick="addTopRate()"><i class="fa-solid fa-plus"></i> إضافة سعر اليوم</button>
      </div>

      <div class="card">
        <h2><i class="fa-solid fa-wrench"></i> وضع الصيانة</h2>
        <div class="checkbox-group">
          <input type="checkbox" id="maintenanceMode">
          <label for="maintenanceMode">تفعيل وضع الصيانة</label>
        </div>
        <div class="form-group">
          <label>عنوان الصيانة</label>
          <input type="text" id="mTitle" placeholder="نحدث نظامنا">
        </div>
        <div class="form-group">
          <label>رسالة الصيانة</label>
          <input type="text" id="mMsg" placeholder="راجعين بعد شوي بأحلى الأسعار">
        </div>
        <button class="btn-save" onclick="saveMaintenance()"><i class="fa-solid fa-floppy-disk"></i> حفظ</button>
      </div>

      <div class="card">
        <h2><i class="fa-solid fa-pen"></i> النصوص الرئيسية</h2>
        <div class="form-group">
          <label>العنوان الرئيسي</label>
          <input type="text" id="siteTitle" placeholder="💵 م. إسماعيل للصرافة">
        </div>
        <div class="form-group">
          <label>النص الترحيبي</label>
          <input type="text" id="siteSubtitle" placeholder="أهلا بالغالي، نورنا والله">
        </div>
        <div class="form-group">
          <label>نص التذييل</label>
          <input type="text" id="siteFooter" placeholder="✨ جاهزين لخدمتك 24/7">
        </div>
        <div class="form-group">
          <label>سؤال الحاسبة</label>
          <input type="text" id="calcQuestion" placeholder="شو بدك تحول اليوم يا غالي؟">
        </div>
        <div class="form-group">
          <label>رقم الواتساب</label>
          <input type="text" id="adminWhatsapp" placeholder="963999999999">
        </div>
        <button class="btn-save" onclick="saveTexts()"><i class="fa-solid fa-floppy-disk"></i> حفظ</button>
      </div>
    </div>

    <!-- تبويب العملات -->
    <div id="ratesTab" class="tab-content">
      <div class="card">
        <h2><i class="fa-solid fa-coins"></i> إدارة العملات - الحاسبة</h2>
        <div id="ratesList"></div>
        <h3 style="margin:24px 0 16px;font-size:18px"><i class="fa-solid fa-plus-circle"></i> إضافة عملة جديدة</h3>
        <div class="form-row">
          <div class="form-group">
            <label>اسم العملة</label>
            <input type="text" id="rateName" placeholder="يورو">
          </div>
          <div class="form-group">
            <label>السعر</label>
            <input type="number" id="ratePrice" placeholder="15800">
          </div>
        <div class="form-row">
          <div class="form-group">
            <label>رابط العلم</label>
            <input type="text" id="rateFlag" placeholder="https://flagcdn.com/eu.svg">
          </div>
          <div class="form-group">
            <label>العملة المقابلة</label>
            <input type="text" id="toCurrency" placeholder="دولار">
          </div>
        </div>
        <button class="btn-add" onclick="addRate()"><i class="fa-solid fa-plus"></i> إضافة العملة</button>
      </div>
    </div>

    <!-- تبويب VIP -->
    <div id="vipTab" class="tab-content">
      <div class="card">
        <h2><i class="fa-solid fa-crown"></i> نظام VIP</h2>
        <div class="checkbox-group">
          <input type="checkbox" id="vipEnabled">
          <label for="vipEnabled">تفعيل نظام VIP</label>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>نسبة الخصم %</label>
            <input type="number" id="vipDiscount" step="0.1" placeholder="0.5">
          </div>
          <div class="form-group">
            <label>الحد الأدنى للمبلغ</label>
            <input type="number" id="vipMinAmount" placeholder="1000">
          </div>
        </div>
        <button class="btn-save" onclick="saveVIP()"><i class="fa-solid fa-floppy-disk"></i> حفظ</button>
      </div>
    </div>

    <!-- تبويب الطلبات -->
    <div id="ordersTab" class="tab-content">
      <div class="card">
        <h2><i class="fa-solid fa-list"></i> الطلبات الواردة</h2>
        <div id="ordersList"></div>
      </div>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script>
const firebaseConfig = {
  apiKey: "AIzaSyBOXdcW29xPJeFAwpMokzXNRrywUXTlR8U",
  authDomain: "ismail-7257e.firebaseapp.com",
  databaseURL: "https://ismail-7257e-default-rtdb.firebaseio.com",
  projectId: "ismail-7257e",
  storageBucket: "ismail-7257e.firebasestorage.app",
  messagingSenderId: "206586253450",
  appId: "1:206586253450:web:1784ae1b6c0e577d071d73",
  measurementId: "G-MWJBQCPMBV"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const ADMIN_PASS="admin123";

function login(){if(passwordInput.value===ADMIN_PASS){loginScreen.style.display="none";adminPanel.style.display="block";loadData();showMsg("تم تسجيل الدخول بنجاح ✅")}else{showMsg("كلمة المرور خاطئة ❌")}}
function logout(){adminPanel.style.display="none";loginScreen.style.display="block";passwordInput.value=""}
function switchTab(t){document.querySelectorAll(".tab").forEach(e=>e.classList.remove("active"));document.querySelectorAll(".tab-content").forEach(e=>e.classList.remove("active"));event.target.closest(".tab").classList.add("active");document.getElementById(t+"Tab").classList.add("active")}
function showMsg(t){const e=document.createElement("div");e.className="msg";e.innerText=t;document.body.appendChild(e);setTimeout(()=>e.remove(),3000)}

// دالة تحديث الوقت
function updateLastUpdate(){
  db.ref('exchange_v7/lastUpdate').set(Date.now());
}

function loadData(){
  db.ref("exchange_v7").on("value",s=>{
    const d=s.val()||{};
    marqueeText.value=d.marqueeText||"";
    marqueeShow.checked=d.marqueeShow||false;
    mTitle.value=d.mTitle||"";
    mMsg.value=d.mMsg||"";
    maintenanceMode.checked=d.maintenance||false;
    siteTitle.value=d.siteTitle||"";
    siteSubtitle.value=d.siteSubtitle||"";
    siteFooter.value=d.siteFooter||"";
    calcQuestion.value=d.calcQuestion||"";
    adminWhatsapp.value=d.adminWhatsapp||"";
    vipEnabled.checked=d.vipEnabled||false;
    vipDiscount.value=d.vipDiscount||0.5;
    vipMinAmount.value=d.vipMinAmount||1000;
    
    // أسعار اليوم
    const topRates=d.topRates||[];
    topRatesList.innerHTML=topRates.map((r,i)=>`
      <div class="rate-item">
        <div class="rate-info">
          <img src="${r.flag}" alt="">
          <div>
            <strong>${r.name}</strong>
            <span>${r.price}</span>
          </div>
        </div>
        <button class="btn-delete" onclick="deleteTopRate(${i})"><i class="fa-solid fa-trash"></i></button>
      </div>
    `).join("")||'<p style="text-align:center;color:var(--text2)">لا توجد أسعار مضافة</p>';
    
    // العملات
    const rates=d.rates||[];
    ratesList.innerHTML=rates.map((r,i)=>`
      <div class="rate-item">
        <div class="rate-info">
          <img src="${r.flag}" alt="">
          <div>
            <strong>${r.name}</strong>
            <span>${r.price} → ${r.toCurrency||'دولار'}</span>
          </div>
        <button class="btn-delete" onclick="deleteRate(${i})"><i class="fa-solid fa-trash"></i></button>
      </div>
    `).join("")||'<p style="text-align:center;color:var(--text2)">لا توجد عملات مضافة</p>';
    
    // الطلبات
    const orders=d.orders||{};
    const ordersArr=Object.entries(orders).reverse();
    totalOrders.innerText=ordersArr.length;
    const today=new Date().toDateString();
    todayOrders.innerText=ordersArr.filter(([k,o])=>new Date(o.timestamp).toDateString()===today).length;
    pendingOrders.innerText=ordersArr.filter(([k,o])=>o.status==="pending").length;
    ordersList.innerHTML=ordersArr.map(([id,o])=>{
      const date=new Date(o.timestamp).toLocaleString('ar-SY');
      return `<div class="rate-item">
        <div>
          <strong>${o.currency}</strong><br>
          <span>المبلغ: ${o.amount} → ${o.result}</span><br>
          <span style="font-size:12px;color:var(--text2)">${date}</span>
          ${o.isVip?'<span style="background:var(--yellow);color:#78350f;padding:2px 8px;border-radius:6px;font-size:11px;margin-right:8px">VIP</span>':''}
        </div>
      </div>`
    }).join("")||'<p style="text-align:center;color:var(--text2)">لا توجد طلبات</p>';
  });
}

function saveMarquee(){
  db.ref('exchange_v7/marqueeText').set(marqueeText.value);
  db.ref('exchange_v7/marqueeShow').set(marqueeShow.checked);
  updateLastUpdate();
  showMsg("تم الحفظ ✅");
}

function addTopRate(){
  if(!topRateName.value||!topRatePrice.value||!topRateFlag.value)return showMsg("عبي كل الحقول ❌");
  db.ref('exchange_v7/topRates').once('value',s=>{
    const arr=s.val()||[];
    arr.push({name:topRateName.value,price:topRatePrice.value,flag:topRateFlag.value,show:true});
    db.ref('exchange_v7/topRates').set(arr);
    topRateName.value="";topRatePrice.value="";topRateFlag.value="";
    updateLastUpdate();
    showMsg("تمت الإضافة ✅");
  });
}

function deleteTopRate(i){
  db.ref('exchange_v7/topRates').once('value',s=>{
    const arr=s.val()||[];
    arr.splice(i,1);
    db.ref('exchange_v7/topRates').set(arr);
    updateLastUpdate();
    showMsg("تم الحذف ✅");
  });
}

function saveMaintenance(){
  db.ref('exchange_v7/maintenance').set(maintenanceMode.checked);
  db.ref('exchange_v7/mTitle').set(mTitle.value);
  db.ref('exchange_v7/mMsg').set(mMsg.value);
  updateLastUpdate();
  showMsg("تم الحفظ ✅");
}

function saveTexts(){
  db.ref('exchange_v7/siteTitle').set(siteTitle.value);
  db.ref('exchange_v7/siteSubtitle').set(siteSubtitle.value);
  db.ref('exchange_v7/siteFooter').set(siteFooter.value);
  db.ref('exchange_v7/calcQuestion').set(calcQuestion.value);
  db.ref('exchange_v7/adminWhatsapp').set(adminWhatsapp.value);
  updateLastUpdate();
  showMsg("تم الحفظ ✅");
}

function addRate(){
  if(!rateName.value||!ratePrice.value||!rateFlag.value)return showMsg("عبي كل الحقول ❌");
  db.ref('exchange_v7/rates').once('value',s=>{
    const arr=s.val()||[];
    arr.push({name:rateName.value,price:ratePrice.value,flag:rateFlag.value,toCurrency:toCurrency.value||'دولار',show:true});
    db.ref('exchange_v7/rates').set(arr);
    rateName.value="";ratePrice.value="";rateFlag.value="";toCurrency.value="";
    updateLastUpdate();
    showMsg("تمت الإضافة ✅");
  });
}

function deleteRate(i){
  db.ref('exchange_v7/rates').once('value',s=>{
    const arr=s.val()||[];
    arr.splice(i,1);
    db.ref('exchange_v7/rates').set(arr);
    updateLastUpdate();
    showMsg("تم الحذف ✅");
  });
}

function saveVIP(){
  db.ref('exchange_v7/vipEnabled').set(vipEnabled.checked);
  db.ref('exchange_v7/vipDiscount').set(parseFloat(vipDiscount.value));
  db.ref('exchange_v7/vipMinAmount').set(parseFloat(vipMinAmount.value));
  updateLastUpdate();
  showMsg("تم الحفظ ✅");
}
</script>
</body>
</html>
