<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>أسعار العملات - م. إسماعيل</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Tajawal', Arial, sans-serif; }
    body { background: #f7f7f7; color: #333; }
    header {
      background: #1a365d; color: white; padding: 15px 20px;
      display: flex; justify-content: space-between; align-items: center;
    }
    header h1 { font-size: 18px; }
   .back-btn {
      color: white; text-decoration: none; font-size: 14px;
      background: rgba(255,255,255,0.2); padding: 6px 12px; border-radius: 6px;
    }
   .container { max-width: 900px; margin: 20px auto; padding: 0 15px; }
    h2, h3 { margin: 20px 0 10px; color: #1a365d; }
   .update-time { font-size: 13px; color: #666; margin-bottom: 15px; }

   .rates-grid { display: grid; grid-template-columns: 1fr; gap: 10px; }
   .rate-card {
      background: white; padding: 12px 15px; border-radius: 10px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.08);
      display: flex; align-items: center; justify-content: space-between;
    }
   .pair { display: flex; align-items: center; gap: 8px; font-weight: 500; }
   .pair img { border-radius: 3px; object-fit: cover; }
   .price { font-weight: bold; color: #1a365d; font-size: 15px; }

   .calc-btn {
      background: #1a365d; color: white; border: none;
      padding: 6px 12px; border-radius: 6px; cursor: pointer;
      font-size: 13px; transition: 0.2s;
    }
   .calc-btn:hover { background: #2b6cb0; }

   .calc-box {
      background: white; padding: 20px; border-radius: 10px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.08); margin-top: 15px;
    }
   .calc-row {
      display: flex; gap: 10px; align-items: center; margin-bottom: 12px;
    }
   .calc-row input {
      flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 15px;
    }
   .select-wrap {
      display: flex; align-items: center; gap: 6px;
      border: 1px solid #ddd; border-radius: 8px; padding: 5px 8px;
      background: #fff; flex: 1;
    }
   .select-wrap select {
      border: none; outline: none; flex: 1; font-size: 15px; background: transparent;
    }
   .swap-btn {
      background: #f0f0f0; border: none; padding: 8px; border-radius: 50%;
      cursor: pointer; font-size: 18px;
    }
   .swap-btn:hover { background: #e0e0e0; }
   .calc-result {
      text-align: center; font-size: 18px; font-weight: bold;
      color: #1a365d; margin-top: 10px;
    }
   .no-data {
      text-align: center; padding: 60px 20px; color: #888;
      font-size: 15px; background: white; border-radius: 10px;
      margin-top: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.08);
    }
  </style>
</head>
<body>
  <header>
    <h1>م. إسماعيل للحوالات</h1>
    <a href="index.html" class="back-btn">← رجوع</a>
  </header>

  <main class="container">
    <h2>أسعار الصرف</h2>
    <p class="update-time">آخر تحديث: <span id="lastUpdate"></span></p>
    <div id="ratesList" class="rates-grid"></div>

    <h3 id="calculator">حاسبة التحويل</h3>
    <div class="calc-box">
      <!-- من -->
      <div class="calc-row">
        <input type="number" id="amount" value="1" min="0" placeholder="المبلغ">
        <div class="select-wrap">
          <img id="fromFlag" src="" width="24" height="18">
          <select id="fromCurrency"></select>
        </div>
      </div>

      <!-- زر تبديل -->
      <div style="text-align:center;">
        <button class="swap-btn" onclick="swapCurrencies()">⇅</button>
      </div>

      <!-- إلى -->
      <div class="calc-row">
        <div class="calc-result" id="result">0</div>
        <div class="select-wrap">
          <img id="toFlag" src="" width="24" height="18">
          <select id="toCurrency"></select>
        </div>
      </div>
    </div>

    <div id="noData" class="no-data" style="display:none;">
      لا توجد عملات مضافة حالياً
    </div>
  </main>

  <script>
    const rates = JSON.parse(localStorage.getItem("rates")) || [];
    const ratesList = document.getElementById("ratesList");
    const noData = document.getElementById("noData");
    const fromCurrency = document.getElementById("fromCurrency");
    const toCurrency = document.getElementById("toCurrency");
    const amountInput = document.getElementById("amount");
    const resultSpan = document.getElementById("result");
    const fromFlag = document.getElementById("fromFlag");
    const toFlag = document.getElementById("toFlag");

    if (rates.length === 0) {
      noData.style.display = "block";
      ratesList.style.display = "none";
    } else {
      // عرض الأسعار مع زر الحاسبة
      ratesList.innerHTML = rates.map(r => `
        <div class="rate-card">
          <div class="pair">
            <img src="${r.flag}" width="28" height="20" alt="${r.name}">
            <span>${r.name}</span>
          </div>
          <div style="display:flex; align-items:center; gap:10px;">
            <span class="price">${Number(r.price).toLocaleString()} ل.س</span>
            <button class="calc-btn" onclick="openCalc('${r.name}', ${r.price})">
              حاسبة
            </button>
          </div>
        </div>
      `).join("");

      // تعبئة القوائم
      const options = rates.map(r =>
        `<option value="${r.price}" data-flag="${r.flag}" data-name="${r.name}">${r.name}</option>`
      ).join("");

      fromCurrency.innerHTML = options;
      toCurrency.innerHTML = options;

      // القيم الافتراضية: من دولار إلى ليرة
      fromCurrency.value = rates.find(r => r.name.includes("دولار"))?.price || rates[0].price;
      toCurrency.value = 1; // الليرة = 1

      updateFlags();
      calc();

      fromCurrency.onchange = () => { updateFlags(); calc(); };
      toCurrency.onchange = () => { updateFlags(); calc(); };
      amountInput.oninput = calc;

      // وقت التحديث
      document.getElementById("lastUpdate").textContent =
        new Date().toLocaleString("ar-SY", {
          year: 'numeric', month: '2-digit', day: '2-digit',
          hour: '2-digit', minute: '2-digit'
        });
    }

    function updateFlags() {
      const fromOpt = fromCurrency.options[fromCurrency.selectedIndex];
      const toOpt = toCurrency.options[toCurrency.selectedIndex];
      fromFlag.src = fromOpt.dataset.flag;
      toFlag.src = toOpt.dataset.flag;
    }

    function calc() {
      const fromRate = parseFloat(fromCurrency.value);
      const toRate = parseFloat(toCurrency.value);
      const amount = parseFloat(amountInput.value) || 0;
      // التحويل: المبلغ * سعر العملة المصدر / سعر العملة الهدف
      const result = (amount * fromRate) / toRate;
      resultSpan.textContent = result.toLocaleString(undefined, {maximumFractionDigits: 2});
    }

    function swapCurrencies() {
      const temp = fromCurrency.value;
      fromCurrency.value = toCurrency.value;
      toCurrency.value = temp;
      updateFlags();
      calc();
    }

    // لما يكبس زر الحاسبة جنب العملة
    function openCalc(name, price) {
      document.getElementById("calculator").scrollIntoView({behavior: "smooth"});
      fromCurrency.value = price;
      toCurrency.value = 1; // ليرة
      amountInput.value = 1;
      updateFlags();
      calc();
    }
  </script>
</body>
</html>
