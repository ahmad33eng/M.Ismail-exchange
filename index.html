<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>م. إسماعيل للصرافة</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
:root{
--green:#059669;--green-dark:#047857;--green-light:#10b981;--gold:#fbbf24;--gold-dark:#f59e0b;
--bg:#f0fdf4;--bg2:#dcfce7;--card:#ffffff;--text:#1e293b;--text2:#475569;--border:#e2e8f0;
--red:#dc2626;--blue:#2563eb;--shadow:0 10px 30px rgba(0,0,0,.08)
}
*{box-sizing:border-box;font-family:'Cairo',sans-serif;margin:0;padding:0}
body{margin:0;background:linear-gradient(135deg,var(--bg) 0%,var(--bg2) 100%);min-height:100vh;padding:12px;color:var(--text)}
.container{max-width:480px;margin:0 auto}

/* شاشة التحميل */
#splash{position:fixed;inset:0;background:linear-gradient(135deg,var(--green) 0%,var(--green-dark) 100%);display:flex;align-items:center;justify-content:center;flex-direction:column;z-index:99999;transition:.5s}
#splash.hide{opacity:0;pointer-events:none}
#splash h1{color:white;font-size:28px;font-weight:900;margin-bottom:8px}
#splash p{color:white;opacity:.9;font-size:16px;font-weight:600}
.loader{width:44px;height:44px;border:4px solid rgba(255,255,255,.3);border-top-color:white;border-radius:50%;animation:spin 1s linear infinite;margin-top:18px}
@keyframes spin{to{transform:rotate(360deg)}}

/* الإعلان المتحرك */
.marquee{background:linear-gradient(90deg,var(--green-dark) 0%,var(--green) 50%,var(--green-dark) 100%);color:white;padding:10px;border-radius:14px;margin-bottom:12px;overflow:hidden;box-shadow:var(--shadow);display:none}
.marquee.active{display:block}
.marquee-content{display:inline-block;animation:scroll 20s linear infinite;padding-right:100%}
@keyframes scroll{0%{transform:translateX(0)}100%{transform:translateX(-100%)}}

/* الهيدر */
.header{background:linear-gradient(135deg,var(--green) 0%,var(--green-dark) 100%);color:white;padding:24px 20px;border-radius:20px;margin-bottom:16px;box-shadow:var(--shadow);text-align:center;position:relative;overflow:hidden}
.header::before{content:'';position:absolute;top:-50%;right:-50%;width:200%;height:200%;background:radial-gradient(circle,rgba(255,255,255,.1) 0%,transparent 70%);animation:rotate 20s linear infinite}
@keyframes rotate{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
.header h1{margin:0 0 6px;font-size:28px;font-weight:900;position:relative;z-index:1}
.header p{margin:0;font-size:14px;opacity:.95;position:relative;z-index:1;font-weight:600}

/* الكروت */
.banking-card{background:var(--card);border-radius:20px;padding:20px;margin-bottom:16px;box-shadow:var(--shadow);border:2px solid var(--border)}
.banking-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;padding-bottom:12px;border-bottom:2px solid var(--border)}
.banking-title{font-size:18px;font-weight:900;color:var(--green);display:flex;align-items:center;gap:8px}
.update-time{font-size:11px;color:var(--text2);background:var(--bg);padding:6px 12px;border-radius:20px;font-weight:700;display:flex;align-items:center;gap:6px}
.update-time i{color:var(--green);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}

/* أسعار الصرف */
.rate-item{background:linear-gradient(135deg,#ffffff 0%,var(--bg) 100%);border:2px solid var(--border);border-radius:16px;padding:14px;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between}
.rate-left{display:flex;align-items:center;gap:12px}
.rate-flag{width:48px;height:36px;border-radius:8px;border:2px solid var(--border);object-fit:cover;box-shadow:0 2px 8px rgba(0,0,0,.1)}
.rate-info{display:flex;flex-direction:column;gap:2px}
.rate-name{font-size:16px;font-weight:900;color:var(--text)}
.rate-label{font-size:11px;color:var(--text2);font-weight:600}
.rate-price{font-size:20px;font-weight:900;color:var(--green);direction:ltr}
.btn-more{background:var(--blue);color:white;border:none;padding:12px;border-radius:12px;font-weight:700;width:100%;margin-top:10px;cursor:pointer}

/* قسم التحويل */
.calc-card{background:var(--card);border-radius:20px;padding:24px;margin-bottom:16px;box-shadow:var(--shadow);border:2px solid var(--border)}
.calc-title{text-align:center;font-size:20px;font-weight:900;color:var(--green);margin:0 0 20px;display:flex;align-items:center;justify-content:center;gap:8px}
.calc-row{display:grid;grid-template-columns:1fr auto 1fr;gap:10px;align-items:end;margin-bottom:16px}
.input-group label{display:block;margin-bottom:8px;font-weight:700;color:var(--text2);font-size:14px}
.input-group select,.input-group input{width:100%;padding:14px;border:2px solid var(--border);border-radius:14px;font-size:16px;font-weight:600;background:var(--bg)}
.input-group select:focus,.input-group input:focus{border-color:var(--green);outline:none;background:white}
.swap-btn{background:var(--green);color:white;border:none;width:46px;height:46px;border-radius:50%;cursor:pointer;font-size:18px;transition:.2s}
.swap-btn:active{transform:rotate(180deg) scale(.9)}
.result-box{background:linear-gradient(135deg,var(--green-light) 0%,var(--green) 100%);color:white;padding:18px;border-radius:16px;text-align:center;margin:16px 0;font-size:22px;font-weight:900;box-shadow:0 8px 20px rgba(5,150,105,.3)}
.vip-badge{background:linear-gradient(135deg,var(--gold) 0%,var(--gold-dark) 100%);color:#78350f;padding:8px 16px;border-radius:12px;font-size:13px;font-weight:900;display:inline-flex;align-items:center;gap:6px;margin:8px 0}
.btn-primary{background:linear-gradient(135deg,var(--green) 0%,var(--green-dark) 100%);color:white;border:none;padding:16px;border-radius:14px;font-weight:900;font-size:16px;cursor:pointer;width:100%;display:flex;align-items:center;justify-content:center;gap:8px}

.footer{text-align:center;padding:20px;color:var(--text2);font-weight:600;font-size:13px}

/* وضع الصيانة */
.maintenance{position:fixed;inset:0;background:linear-gradient(135deg,var(--bg) 0%,var(--bg2) 100%);z-index:9999;display:none;align-items:center;justify-content:center;text-align:center;padding:20px}
.maintenance.active{display:flex}
.maintenance-box{background:var(--card);padding:40px;border-radius:24px;box-shadow:var(--shadow);max-width:400px;border:2px solid var(--border)}
.maintenance-box i{font-size:64px;color:var(--green);margin-bottom:16px}
.maintenance-box h2{margin:0 0 12px;font-size:24px;font-weight:900}
.maintenance-box p{margin:0;color:var(--text2);font-weight:600}

.empty-state{text-align:center;padding:40px 20px;color:var(--text2)}
.empty-state i{font-size:48px;margin-bottom:12px;opacity:.3}

.flag-small{width:28px;height:20px;border-radius:4px;border:1px solid var(--border);vertical-align:middle;margin-left:6px}
@media(max-width:380px){.header h1{font-size:24px}.rate-price{font-size:18px}}
</style>
</head>
<body>

<!-- شاشة التحميل -->
<div id="splash">
<h1>💵 م. إسماعيل للصرافة</h1>
<p id="splashText">أهلا بالغالي، نورنا والله</p>
<div class="loader"></div>
</div>

<div class="container" id="mainContent">
<!-- القسم 1: الهيدر والإعلان -->
<div id="marquee" class="marquee"><div class="marquee-content" id="marqueeText"></div></div>
<div class="header">
<h1 id="siteTitle">💵 م. إسماعيل للصرافة</h1>
<p id="siteSubtitle">أهلا بالغالي، نورنا والله</p>
</div>

<!-- القسم 2: أسعار الصرف -->
<div class="banking-card">
<div class="banking-header">
<div class="banking-title"><i class="fa-solid fa-chart-line"></i> أسعار الصرف اليوم</div>
<div class="update-time" id="updateTime"><i class="fa-solid fa-clock"></i> <span>جاري التحديث...</span></div>
</div>
<div id="topRatesList"><div class="empty-state"><i class="fa-solid fa-coins"></i><p>لا توجد أسعار مضافة</p></div></div>
<div style="text-align: center; margin-top: 10px;">
  <a href="currencies.html" class="btn-more">عرض كل العملات</a>
</div>
</div>

<!-- القسم 3: التحويل والحاسبة -->
<div class="calc-card">
<div class="calc-title"><i class="fa-solid fa-calculator"></i> <span id="calcQuestion">شو بدك تحول اليوم يا غالي؟</span></div>

<div class="calc-row">
<div class="input-group">
<label>من</label>
<select id="fromCurrency"></select>
</div>
<button class="swap-btn" onclick="swapCurrencies()"><i class="fa-solid fa-arrow-right-arrow-left"></i></button>
<div class="input-group">
<label>إلى</label>
<select id="toCurrency"></select>
</div>
</div>

<div class="input-group">
<label>المبلغ</label>
<input type="number" id="amount" placeholder="اكتب المبلغ هنا" oninput="calculate()">
</div>

<div class="result-box" id="result">0</div>
<div id="vipBadge" style="text-align:center;display:none">
<div class="vip-badge"><i class="fa-solid fa-crown"></i> خصم VIP مفعل</div>
</div>
<button class="btn-primary" onclick="sendOrder()"><i class="fa-brands fa-whatsapp"></i> اطلب عالواتساب</button>
</div>

<div class="footer" id="siteFooter">✨ جاهزين لخدمتك 24/7</div>
</div>

<!-- وضع الصيانة -->
<div id="maintenance" class="maintenance">
<div class="maintenance-box">
<i class="fa-solid fa-screwdriver-wrench"></i>
<h2 id="mTitle">نحدث نظامنا</h2>
<p id="mMsg">راجعين بعد شوي بأحلى الأسعار</p>
</div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script>
const firebaseConfig = {
apiKey: "AIzaSyBOXdcW29xPJeFAwpMokzXNRrywUXTlR8U",
authDomain: "ismail-7257e.firebaseapp.com",
databaseURL: "https://ismail-7257e-default-rtdb.firebaseio.com",
projectId: "ismail-7257e",
storageBucket: "ismail-7257e.firebasestorage.app",
messagingSenderId: "206586253450",
appId: "1:206586253450:web:1784ae1b6c0e577d071d73"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let data={},ratesData=[],currentFrom=0,currentTo=1,vipActive=false;

// شاشة التحميل
window.addEventListener('load',()=>{
setTimeout(()=>document.getElementById('splash').classList.add('hide'),2000);
});

db.ref("exchange_v7").on("value",s=>{
data=s.val()||{};

// وضع الصيانة
if(data.maintenance){
maintenance.classList.add("active");
mTitle.innerText=data.mTitle||"نحدث نظامنا";
mMsg.innerText=data.mMsg||"راجعين بعد شوي";
mainContent.style.display='none';
return
}else{
maintenance.classList.remove("active");
mainContent.style.display='block';
}

// النصوص
siteTitle.innerText=data.siteTitle||"💵 م. إسماعيل للصرافة";
siteSubtitle.innerText=data.siteSubtitle||"أهلا بالغالي، نورنا والله";
siteFooter.innerText=data.siteFooter||"✨ جاهزين لخدمتك 24/7";
calcQuestion.innerText=data.calcQuestion||"شو بدك تحول اليوم يا غالي؟";
splashText.innerText=data.siteSubtitle||"أهلا بالغالي، نورنا والله";

// الإعلان
if(data.marqueeShow&&data.marqueeText){
marquee.classList.add("active");
marqueeText.innerText=data.marqueeText
}else{
marquee.classList.remove("active")
}

// وقت التحديث
if(data.lastUpdate){
const date=new Date(data.lastUpdate);
const timeStr=date.toLocaleTimeString('ar-SY',{hour:'2-digit',minute:'2-digit'});
const dateStr=date.toLocaleDateString('ar-SY');
updateTime.innerHTML=`<i class="fa-solid fa-clock"></i> <span>${dateStr} ${timeStr}</span>`;
}

// أسعار اليوم
const topRates=(data.topRates||[]).filter(r=>r.show);
topRatesList.innerHTML=topRates.length?topRates.map(r=>`
<div class="rate-item">
<div class="rate-left">
<img src="${r.flag}" class="rate-flag" alt="${r.name}">
<div class="rate-info">
<div class="rate-name">${r.name}</div>
<div class="rate-label">سعر الصرف</div>
</div>
</div>
<div class="rate-price">${r.price}</div>
</div>
`).join(""):'<div class="empty-state"><i class="fa-solid fa-coins"></i><p>لا توجد أسعار مضافة</p></div>';

// العملات للحاسبة
ratesData=(data.rates||[]).filter(r=>r.show);
populateCurrencies();
calculate();
});

function populateCurrencies(){
const fromSel=document.getElementById('fromCurrency');
const toSel=document.getElementById('toCurrency');
fromSel.innerHTML=ratesData.map((r,i)=>`<option value="${i}">${r.name}</option>`).join('');
toSel.innerHTML=ratesData.map((r,i)=>`<option value="${i}" ${i==1?'selected':''}>${r.name}</option>`).join('');
fromSel.onchange=()=>{currentFrom=fromSel.value;calculate()}
toSel.onchange=()=>{currentTo=toSel.value;calculate()}
}

function calculate(){
const amt=parseFloat(amount.value)||0;
if(!ratesData.length||amt<=0){
result.innerText="0";
vipBadge.style.display="none";
vipActive=false;
return
}
const fromRate=parseFloat(ratesData[currentFrom].price);
const toRate=parseFloat(ratesData[currentTo].price);
let res=(amt/fromRate)*toRate;

vipActive=false;
if(data.vipEnabled&&amt>=data.vipMinAmount){
res=res*(1-data.vipDiscount/100);
vipActive=true;
vipBadge.style.display="block";
}else{
vipBadge.style.display="none";
}

result.innerText=res.toLocaleString('ar-SY',{maximumFractionDigits:2})+" "+ratesData[currentTo].name;
}

function swapCurrencies(){
[currentFrom,currentTo]=[currentTo,currentFrom];
document.getElementById('fromCurrency').value=currentFrom;
document.getElementById('toCurrency').value=currentTo;
calculate();
}

function sendOrder(){
const amt=amount.value;
if(!amt||amt<=0)return alert("عبي المبلغ أول يا غالي");
const res=result.innerText;
const msg=`مرحبا م. إسماعيل 👋%0Aبدي حول:%0A💰 المبلغ: ${amt}%0A💱 من: ${ratesData[currentFrom].name}%0Aإلى: ${ratesData[currentTo].name}%0A✅ النتيجة: ${res}${vipActive?'%0A👑 VIP مفعل':''}`;
const wa=data.adminWhatsapp||"963999";
window.open(`https://wa.me/${wa}?text=${msg}`,"_blank");

// حفظ الطلب
db.ref('exchange_v7/orders').push({
amount:amt,
currency:`${ratesData[currentFrom].name} → ${ratesData[currentTo].name}`,
result:res,
isVip:vipActive,
timestamp:Date.now(),
status:"pending"
});
}
</script>
</body>
</html>
